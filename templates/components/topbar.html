<!-- Premium Top Bar Component -->
<header class="topbar">
  <div class="topbar-left">
    <h1 class="page-title" style="margin: 0; font-size: 20px;">{{ page_title or 'Dashboard' }}</h1>
  </div>

  <div class="topbar-right">
    <!-- Dark Mode Toggle -->
    <button @click="toggleTheme()" class="topbar-icon-btn" title="Toggle theme">
      <svg x-show="!dark" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
      </svg>
      <svg x-show="dark" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
      </svg>
    </button>

    <!-- Profile Dropdown -->
    <div class="topbar-profile" @click="window.location.href='/profile'">
      <div class="topbar-avatar">
        {{ user.initials if user and user.initials else 'U' }}
      </div>
      <div style="display: flex; flex-direction: column; align-items: flex-start;">
        <span style="font-size: 13px; font-weight: 500; color: var(--text-primary);">
          {{ user.name if user and user.name else 'User' }}
        </span>
        <span style="font-size: 11px; color: var(--text-tertiary);">
          {{ user.email if user and user.email else '' }}
        </span>
      </div>
    </div>
  </div>
</header>
